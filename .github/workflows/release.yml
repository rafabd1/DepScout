name: Release Harpy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        
      - name: Build for all platforms
        run: |
          # Build for Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }}" -o harpy-${{ env.VERSION }}-windows-amd64.exe ./cmd/harpy/
          
          # Build for Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }}" -o harpy-${{ env.VERSION }}-linux-amd64 ./cmd/harpy/
          
          # Build for macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }}" -o harpy-${{ env.VERSION }}-darwin-amd64 ./cmd/harpy/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Harpy v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            harpy-${{ env.VERSION }}-windows-amd64.exe
            harpy-${{ env.VERSION }}-linux-amd64
            harpy-${{ env.VERSION }}-darwin-amd64
          body: |
            # Harpy v${{ env.VERSION }} - Initial Release

            This is the first release of **Harpy**, a high-performance web reconnaissance tool for extracting endpoints, parameters, and hidden assets from JavaScript files.

            ## Core Features
            - **Advanced JavaScript Analysis**: Hybrid regex and AST-based parsing for accurate endpoint and parameter extraction.
            - **Dual Analysis Modes**:
              - **Regex Mode** (`--enable-regex`): Ultra-fast pattern matching for quick reconnaissance
              - **AST Mode** (`--enable-ast`): Deep JavaScript parsing for comprehensive analysis with higher accuracy
              - **Hybrid Mode**: Intelligent combination of both approaches for optimal results
            - **Intelligent Extraction**: Discovers API endpoints, parameters, headers, domains, and hidden assets.
            - **Concurrent Architecture**: High-speed processing with configurable worker pools for maximum efficiency.
            - **Adaptive Rate Limiting**: Smart per-domain throttling that automatically adjusts to server responses.
            - **Flexible Input Sources**: URLs, local files, directories, or stdin for seamless integration.
            - **Professional Output**: Clean terminal output plus structured JSON for automation and toolchain integration.

            ## Installation
            
            Download the appropriate binary for your platform and make it executable.
            
            For Go users:
            ```
            go install github.com/rafabd1/Harpy/cmd/harpy@latest
            ```
            
            ## Documentation
            
            See the [README.md](https://github.com/rafabd1/Harpy/blob/main/README.md) for usage details and examples.