name: Release Harpy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        
      - name: Build for all platforms
        run: |
          # Build for Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }} -s -w" -o harpy-${{ env.VERSION }}-windows-amd64.exe ./cmd/harpy/
          
          # Build for Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }} -s -w" -o harpy-${{ env.VERSION }}-linux-amd64 ./cmd/harpy/
          
          # Build for macOS Intel
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }} -s -w" -o harpy-${{ env.VERSION }}-darwin-amd64 ./cmd/harpy/
          
          # Build for macOS Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ env.VERSION }} -s -w" -o harpy-${{ env.VERSION }}-darwin-arm64 ./cmd/harpy/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Harpy v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            harpy-${{ env.VERSION }}-windows-amd64.exe
            harpy-${{ env.VERSION }}-linux-amd64
            harpy-${{ env.VERSION }}-darwin-amd64
            harpy-${{ env.VERSION }}-darwin-arm64
          body: |
            # Harpy v${{ env.VERSION }}

            **High-performance web reconnaissance tool for extracting endpoints, parameters, and hidden assets from JavaScript files.**

            ## ✨ What's New

            - **🧠 Intelligent Hybrid Analysis**: Automatic combination of regex and AST-based parsing with smart fallbacks
            - **🎯 99.5% False Positive Reduction**: Advanced contextual analysis for accurate parameter extraction
            - **🚀 High Performance**: Multi-threaded processing with configurable worker pools
            - **⚡ Adaptive Rate Limiting**: Smart per-domain throttling based on server responses
            - **📁 Flexible Input**: URLs, files, directories, or stdin support
            - **🎨 Professional Output**: Clean terminal display plus structured JSON

            ## 🔧 Command Line Options

            ```bash
            # Basic usage
            harpy -u https://target.com/app.js
            harpy -d /path/to/js/files
            harpy -f targets.txt --json -o results.json

            # Advanced options
            harpy -u https://target.com/main.js -v -c 50 -l 50
            harpy -f urls.txt -H "User-Agent: Custom" --proxy http://127.0.0.1:8080
            ```

            ## 🎯 What Harpy Extracts

            - **API Endpoints**: REST APIs, GraphQL schemas, internal services
            - **Parameters**: URL parameters, form fields, API parameters  
            - **Headers**: Authorization tokens, API keys, custom headers
            - **Domains**: Internal domains, subdomains, CDN endpoints
            - **Hidden Assets**: Admin panels, debug endpoints, development URLs

            ## 📦 Installation

            ### Binary Download
            Download the appropriate binary for your platform below.

            ### Go Install
            ```bash
            go install github.com/rafabd1/Harpy/cmd/harpy@latest
            ```

            ### From Source
            ```bash
            git clone https://github.com/rafabd1/Harpy.git
            cd Harpy
            go build -o harpy ./cmd/harpy
            ```

            ## 📚 Documentation

            - [README.md](https://github.com/rafabd1/Harpy/blob/main/README.md) - Complete usage guide
            - [CHANGELOG.md](https://github.com/rafabd1/Harpy/blob/main/CHANGELOG.md) - Version history  

            **⚠️ Disclaimer**: For authorized security testing only. Users must have explicit permission to test targets.